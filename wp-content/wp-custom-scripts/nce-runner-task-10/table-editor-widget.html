<!-- Product Eligibility Table Editor - Embed on WordPress page using Custom HTML block or [product_eligibility_editor] shortcode -->
<div id="te-widget">
  <style>
    #te-widget {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      max-width: 100%;
      margin: 20px auto;
      color: #1a1a2e;
    }
    
    #te-widget * { box-sizing: border-box; }
    
    /* Header */ 
    #te-widget .te-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    } 
    
    #te-widget h2 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    #te-widget .te-subtitle {
      color: #6b7280;
      font-size: 0.9rem;
      margin: 4px 0 0 0;
    }
    
    /* Buttons */
    #te-widget .te-btn {
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    #te-widget .te-btn-primary {
      color: #000;
      background: #d4e157;
      box-shadow: 0 2px 8px rgba(212, 225, 87, 0.3);
    }
    
    #te-widget .te-btn-primary:hover:not(:disabled) {
      background: #c6d449;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(212, 225, 87, 0.4);
    }
    
    #te-widget .te-btn-secondary {
      color: #374151;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
    }
    
    #te-widget .te-btn-secondary:hover:not(:disabled) {
      background: #e5e7eb;
      border-color: #9ca3af;
    }
    
    #te-widget .te-btn-danger {
      color: #fff;
      background: #dc2626;
    }
    
    #te-widget .te-btn-danger:hover:not(:disabled) {
      background: #b91c1c;
    }
    
    #te-widget .te-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    
    #te-widget .te-btn-sm {
      padding: 6px 12px;
      font-size: 0.8rem;
    }
    
    /* Toolbar */
    #te-widget .te-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }
    
    #te-widget .te-toolbar-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    #te-widget .te-safety-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #dc2626;
    }
    
    #te-widget .te-safety-toggle input {
      cursor: pointer;
    }
    
    /* Column Controls */
    #te-widget .te-column-controls {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    
    #te-widget .te-column-controls-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    #te-widget .te-column-controls-title {
      font-weight: 600;
      font-size: 0.9rem;
      color: #374151;
    }
    
    #te-widget .te-column-toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    
    #te-widget .te-column-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    
    #te-widget .te-column-toggle:hover {
      border-color: #9ca3af;
    }
    
    #te-widget .te-column-toggle.hidden {
      background: #f3f4f6;
      color: #9ca3af;
    }
    
    #te-widget .te-column-toggle.dragging {
      opacity: 0.5;
      background: #d4e157;
    }
    
    #te-widget .te-column-toggle .drag-handle {
      cursor: grab;
      color: #9ca3af;
    }
    
    #te-widget .te-column-toggle .drag-handle:active {
      cursor: grabbing;
    }
    
    /* Status Bar */
    #te-widget .te-status {
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      display: none;
    }
    
    #te-widget .te-status.visible { display: block; }
    #te-widget .te-status.info { background: #f0f4ff; border: 1px solid #c7d2fe; color: #4f46e5; }
    #te-widget .te-status.success { background: #ecfdf5; border: 1px solid #a7f3d0; color: #059669; }
    #te-widget .te-status.error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    #te-widget .te-status.warning { background: #fffbeb; border: 1px solid #fde68a; color: #d97706; }
    
    /* Table Container */
    #te-widget .te-table-container {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      max-height: 70vh;
      overflow-y: auto;
    }
    
    /* Table */
    #te-widget table {
      border-collapse: collapse;
      font-size: 0.85rem;
      table-layout: fixed;
    }
    
    #te-widget thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    #te-widget th {
      background: #1f2937;
      color: #fff;
      font-weight: 600;
      text-align: left;
      padding: 10px 12px;
      white-space: normal;
      word-wrap: break-word;
      word-break: break-word;
      overflow: hidden;
      position: relative;
      user-select: none;
      border-right: 1px solid #374151;
    }
    
    #te-widget th:last-child {
      border-right: none;
    }
    
    #te-widget th .th-label {
      display: block;
      padding-right: 8px;
    }
    
    #te-widget th.sortable { cursor: pointer; }
    #te-widget th.sortable:hover { background: #374151; }
    
    #te-widget th.sorted {
      background: #374151;
    }
    
    #te-widget th.sorted .th-label {
      color: #d4e157;
    }
    
    #te-widget th .resize-handle {
      position: absolute;
      right: -6px;
      top: 0;
      bottom: 0;
      width: 12px;
      cursor: col-resize;
      background: transparent;
      z-index: 5;
    }
    
    #te-widget th .resize-handle::after {
      content: '';
      position: absolute;
      right: 5px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: rgba(255,255,255,0.3);
      border-radius: 1px;
    }
    
    #te-widget th .resize-handle:hover::after,
    #te-widget th.resizing .resize-handle::after {
      background: #d4e157;
    }
    
    #te-widget th.resizing {
      background: #374151;
    }
    
    #te-widget td {
      padding: 8px 12px;
      border-bottom: 1px solid #e5e7eb;
      border-right: 1px solid #e5e7eb;
      white-space: normal;
      word-wrap: break-word;
      word-break: break-word;
      overflow: hidden;
      vertical-align: top;
      line-height: 0.85;
    }
    
    #te-widget td:last-child {
      border-right: none;
    }
    
    /* Alternating row colors (zebra stripes) */
    #te-widget tbody tr:nth-child(even) td {
      background: #f9fafb;
    }
    
    #te-widget tbody tr:nth-child(odd) td {
      background: #fff;
    }
    
    #te-widget tr:hover td {
      background: #f0f4ff !important;
    }
    
    #te-widget tr.editing td {
      background: #fffbeb !important;
    }
    
    #te-widget .te-cell-readonly {
      /* Generated/readonly cells look normal but aren't clickable */
    }
    
    #te-widget .te-cell-primary {
      font-weight: 600;
      color: #4f46e5;
    }
    
    #te-widget .te-cell-clickable {
      cursor: pointer;
    }
    
    #te-widget .te-cell-clickable:hover {
      background: #f0f4ff !important;
    }
    
    /* Editable Cell */
    #te-widget .te-cell-edit {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: inherit;
      background: #fff;
    }
    
    #te-widget select.te-cell-edit {
      cursor: pointer;
      appearance: auto;
    }
    
    /* Type-ahead lookup input */
    #te-widget input.te-lookup-input {
      font-size: 0.8rem;
      font-weight: normal;
    }
    
    #te-widget input.te-lookup-input::placeholder {
      color: #9ca3af;
      font-style: italic;
    }
    
    /* Date and time inputs */
    #te-widget input[type="date"].te-cell-edit,
    #te-widget input[type="time"].te-cell-edit {
      cursor: pointer;
      min-width: 130px;
    }
    
    #te-widget input[type="date"].te-cell-edit::-webkit-calendar-picker-indicator,
    #te-widget input[type="time"].te-cell-edit::-webkit-calendar-picker-indicator {
      cursor: pointer;
      padding: 2px;
      margin-left: 4px;
      opacity: 0.7;
    }
    
    #te-widget input[type="date"].te-cell-edit::-webkit-calendar-picker-indicator:hover,
    #te-widget input[type="time"].te-cell-edit::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
    }
    
    #te-widget .te-cell-edit:focus {
      outline: none;
      border-color: #d4e157;
      box-shadow: 0 0 0 2px rgba(212, 225, 87, 0.3);
    }
    
    #te-widget .te-cell-edit:disabled {
      background: #f3f4f6;
      color: #9ca3af;
    }
    
    #te-widget textarea.te-cell-edit {
      min-height: 60px;
      resize: vertical;
    }
    
    /* Expandable text box for long content (4+ lines) */
    #te-widget .te-expandable-text {
      max-height: 3.6em; /* ~4 lines at 0.85 line-height (0.85 * 4 = 3.4em + padding) */
      overflow: auto;
      resize: both;
      min-width: 60px;
      min-height: 2em;
      padding: 3px 4px;
      line-height: 1.1;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      background: #fefefe;
      border: 1px solid #e5e7eb;
      border-radius: 3px;
    }
    
    #te-widget .te-expandable-text:hover {
      border-color: #c7d2fe;
    }
    
    /* Clickable expandable text in editable cells */
    #te-widget td.te-cell-clickable .te-expandable-text {
      cursor: pointer;
    }
    
    #te-widget td.te-cell-clickable .te-expandable-text:hover {
      background: #f0f4ff;
    }
    
    /* Action Buttons in Row */
    #te-widget .te-row-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      white-space: nowrap;
    }
    
    #te-widget .te-row-btn {
      padding: 4px 8px;
      font-size: 0.75rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    #te-widget .te-row-btn-edit {
      background: #dbeafe;
      color: #1d4ed8;
    }
    
    #te-widget .te-row-btn-edit:hover { background: #bfdbfe; }
    
    #te-widget .te-row-btn-save {
      background: #d1fae5;
      color: #059669;
    }
    
    #te-widget .te-row-btn-save:hover { background: #a7f3d0; }
    
    #te-widget .te-row-btn-cancel {
      background: #f3f4f6;
      color: #6b7280;
    }
    
    #te-widget .te-row-btn-cancel:hover { background: #e5e7eb; }
    
    #te-widget .te-row-btn-delete {
      background: #fee2e2;
      color: #dc2626;
    }
    
    #te-widget .te-row-btn-delete:hover { background: #fecaca; }
    #te-widget .te-row-btn-delete:disabled { opacity: 0.4; cursor: not-allowed; }
    
    /* Find Mode */
    #te-widget .te-find-row td {
      background: #f0f4ff;
      padding: 6px 8px;
    }
    
    #te-widget .te-find-input {
      width: 100%;
      padding: 6px 8px;
      border: 2px solid #c7d2fe;
      border-radius: 4px;
      font-size: 0.85rem;
      background: #fff;
    }
    
    #te-widget .te-find-input:focus {
      outline: none;
      border-color: #6366f1;
    }
    
    /* Pagination */
    #te-widget .te-pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding: 10px 0;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    #te-widget .te-pagination-info {
      font-size: 0.85rem;
      color: #6b7280;
    }
    
    #te-widget .te-pagination-controls {
      display: flex;
      gap: 6px;
    }
    
    /* Modal */
    #te-widget .te-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    
    #te-widget .te-modal-overlay.visible {
      display: flex;
    }
    
    #te-widget .te-modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    #te-widget .te-modal h3 {
      margin: 0 0 16px 0;
      font-size: 1.2rem;
    }
    
    #te-widget .te-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    
    /* Form Modal */
    #te-widget .te-form-modal {
      max-width: 1100px;
      width: 95%;
    }
    
    #te-widget .te-form-modal h3 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 12px;
    }
    
    #te-widget .te-form-modal .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #6b7280;
      padding: 0;
      line-height: 1;
    }
    
    #te-widget .te-form-modal .close-btn:hover {
      color: #1f2937;
    }
    
    #te-widget .te-form-section {
      margin-bottom: 20px;
    }
    
    #te-widget .te-form-section-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: #4f46e5;
      margin: 0 0 12px 0;
      padding-bottom: 6px;
      border-bottom: 2px solid #c7d2fe;
    }
    
    #te-widget .te-form-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    
    @media (max-width: 900px) {
      #te-widget .te-form-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    @media (max-width: 650px) {
      #te-widget .te-form-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 450px) {
      #te-widget .te-form-grid {
        grid-template-columns: 1fr;
      }
    }
    
    #te-widget .te-form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    #te-widget .te-form-field label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
    }
    
    #te-widget .te-form-field input,
    #te-widget .te-form-field select,
    #te-widget .te-form-field textarea {
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      background: #fff;
    }
    
    #te-widget .te-form-field input:focus,
    #te-widget .te-form-field select:focus,
    #te-widget .te-form-field textarea:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
    
    #te-widget .te-form-field input:disabled,
    #te-widget .te-form-field textarea:disabled {
      background: #f3f4f6;
      color: #6b7280;
    }
    
    #te-widget .te-form-field textarea {
      min-height: 60px;
      resize: vertical;
    }
    
    #te-widget .te-form-field.readonly input {
      background: #f9fafb;
      cursor: not-allowed;
    }
    
    #te-widget .te-form-readonly-text {
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.9rem;
      background: #f9fafb;
      color: #6b7280;
      line-height: 1.3;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 120px;
      overflow-y: auto;
    }
    
    /* Loading */
    #te-widget .te-loading {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
    
    #te-widget .te-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #e5e7eb;
      border-top-color: #d4e157;
      border-radius: 50%;
      animation: te-spin 0.8s linear infinite;
    }
    
    @keyframes te-spin {
      to { transform: rotate(360deg); }
    }
    
    /* Empty State */
    #te-widget .te-empty {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
    
    /* Context Menu */
    #te-widget .te-context-menu {
      position: fixed;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      min-width: 180px;
      z-index: 9999;
      display: none;
      overflow: hidden;
    }
    
    #te-widget .te-context-menu.visible {
      display: block;
    }
    
    #te-widget .te-context-menu-header {
      padding: 8px 12px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.75rem;
      color: #6b7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    #te-widget .te-context-menu-item {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: #374151;
      transition: background 0.1s;
    }
    
    #te-widget .te-context-menu-item:hover {
      background: #f3f4f6;
    }
    
    #te-widget .te-context-menu-item.active {
      background: #ecfdf5;
      color: #059669;
    }
    
    #te-widget .te-context-menu-item .icon {
      width: 18px;
      text-align: center;
    }
    
    #te-widget .te-context-menu-divider {
      height: 1px;
      background: #e5e7eb;
      margin: 4px 0;
    }
    
    /* Views Bar */
    #te-widget .te-views-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #f0f4ff;
      border: 1px solid #c7d2fe;
      border-radius: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    
    #te-widget .te-views-bar > label {
      font-weight: 600;
      color: #4f46e5;
      font-size: 0.9rem;
    }
    
    /* Radio button view selector */
    #te-widget .te-views-radios {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px 14px;
    }
    
    #te-widget .te-views-radios label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #374151;
      line-height: 1;
    }
    
    #te-widget .te-views-radios label:hover {
      color: #4f46e5;
    }
    
    #te-widget .te-views-radios input[type="radio"] {
      cursor: pointer;
      accent-color: #4f46e5;
      margin: 0;
    }
    
    #te-widget .te-views-radios label.selected {
      font-weight: 600;
      color: #4f46e5;
    }
    
    #te-widget .te-views-info {
      font-size: 0.8rem;
      color: #6b7280;
      font-style: italic;
    }
    
    #te-widget .te-views-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
  </style>

  <div class="te-header">
    <div>
      <h2>Product Eligibility Editor</h2>
      <p class="te-subtitle">View and edit wp_zoho_product_eligibility table</p>
    </div>
    <div class="te-toolbar-group">
      <button class="te-btn te-btn-secondary" onclick="TE.toggleColumnControls()">
        ⚙️ Columns
      </button>
    </div>
  </div>
  
  <!-- Saved Views Bar -->
  <div class="te-views-bar">
    <label>📁 View:</label>
    <div class="te-views-radios" id="te-views-radios"></div>
    <span class="te-views-info" id="te-views-info"></span>
    <div class="te-views-actions">
      <button class="te-btn te-btn-sm te-btn-primary" onclick="TE.saveCurrentView()" id="te-btn-save-view" style="display: none;">💾 Save</button>
      <button class="te-btn te-btn-sm te-btn-secondary" onclick="TE.saveViewAs()">💾 Save As...</button>
      <button class="te-btn te-btn-sm te-btn-secondary" onclick="TE.renameSelectedView()" id="te-btn-rename-view" style="display: none;">✏️ Rename</button>
      <button class="te-btn te-btn-sm te-btn-secondary" onclick="TE.deleteSelectedView()" id="te-btn-delete-view">🗑️ Delete</button>
    </div>
  </div>
  
  <div class="te-column-controls" id="te-column-controls" style="display: none;">
    <div class="te-column-controls-header">
      <span class="te-column-controls-title">Show/Hide & Reorder Columns (drag to reorder)</span>
      <div>
        <button class="te-btn te-btn-sm te-btn-secondary" onclick="TE.showAllColumns()">Show All</button>
        <button class="te-btn te-btn-sm te-btn-secondary" onclick="TE.hideAllColumns()">Hide All</button>
        <button class="te-btn te-btn-sm te-btn-secondary" onclick="TE.resetColumns()">Reset</button>
      </div>
    </div>
    <div class="te-column-toggles" id="te-column-toggles"></div>
  </div>
  
  <div class="te-toolbar">
    <div class="te-toolbar-group">
      <button class="te-btn te-btn-primary" id="te-btn-find" onclick="TE.toggleFindMode()">
        🔍 Find
      </button>
      <button class="te-btn te-btn-secondary" id="te-btn-show-all" onclick="TE.showAllRecords()" style="display: none;">
        📋 Show All
      </button>
      <button class="te-btn te-btn-primary" id="te-btn-add" onclick="TE.addNewRecord()" disabled>
        ➕ Add Record
      </button>
      <button class="te-btn te-btn-secondary" onclick="TE.refresh()">
        🔄 Refresh
      </button>
    </div>
    <div class="te-safety-toggle">
      <input type="checkbox" id="te-enable-destructive" onchange="TE.toggleDestructive()">
      <label for="te-enable-destructive">Enable Add/Delete</label>
    </div>
  </div>
  
  <div class="te-status" id="te-status"></div>
  
  <div class="te-table-container">
    <table id="te-table">
      <thead id="te-thead"></thead>
      <tbody id="te-tbody"></tbody>
    </table>
  </div>
  
  <div class="te-pagination" id="te-pagination"></div>
  
  <!-- Delete Confirmation Modal -->
  <div class="te-modal-overlay" id="te-delete-modal">
    <div class="te-modal">
      <h3>⚠️ Confirm Delete</h3>
      <p>Are you sure you want to delete this record?</p>
      <p><strong>wp_id:</strong> <span id="te-delete-id"></span></p>
      <div class="te-modal-actions">
        <button class="te-btn te-btn-secondary" onclick="TE.closeDeleteModal()">Cancel</button>
        <button class="te-btn te-btn-danger" onclick="TE.confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
  
  <!-- Form View Modal -->
  <div class="te-modal-overlay" id="te-form-modal">
    <div class="te-modal te-form-modal">
      <h3>
        <span>📝 <span id="te-form-title">Record Details</span></span>
        <button class="close-btn" onclick="TE.closeFormModal()">×</button>
      </h3>
      <div id="te-form-content"></div>
      <div class="te-modal-actions">
        <button class="te-btn te-btn-secondary" onclick="TE.closeFormModal()">Cancel</button>
        <button class="te-btn te-btn-primary" onclick="TE.saveFormRecord()">💾 Save</button>
      </div>
    </div>
  </div>
  
  <!-- Column Context Menu -->
  <div class="te-context-menu" id="te-context-menu">
    <div class="te-context-menu-header" id="te-context-menu-title">Column</div>
    <div class="te-context-menu-item" onclick="TE.contextSortAsc()">
      <span class="icon">↑</span> Sort A → Z
    </div>
    <div class="te-context-menu-item" onclick="TE.contextSortDesc()">
      <span class="icon">↓</span> Sort Z → A
    </div>
    <div class="te-context-menu-divider"></div>
    <div class="te-context-menu-item" onclick="TE.contextHideColumn()">
      <span class="icon">👁️</span> Hide Column
    </div>
    <div class="te-context-menu-divider"></div>
    <div class="te-context-menu-item" onclick="TE.contextShowAllColumns()">
      <span class="icon">📋</span> Show All Columns
    </div>
  </div>
</div>

<script>
(function() {
  const baseUrl = window.location.origin;
  const API_BASE = `${baseUrl}/wp-json/table-editor/v1`;
  const STORAGE_KEY = 'te_product_eligibility_prefs';
  
  // Column definitions
  const COLUMNS = [
    { name: 'wp_id', type: 'varchar', primary: true, editable: false, required: true },
    { name: 'name', type: 'varchar', editable: true },
    { name: 'venue_id', type: 'int', editable: true },
    { name: 'venue_short_name', type: 'varchar', editable: true },
    { name: 'sku_old', type: 'varchar', editable: true },
    { name: 'sku_ext_1', type: 'varchar', editable: true },
    { name: 'sku_ext_2', type: 'varchar', editable: true },
    { name: 'status', type: 'varchar', editable: true },
    { name: 'max_yob', type: 'varchar', editable: true },
    { name: 'min_yob', type: 'varchar', editable: true },
    { name: 'max_rating', type: 'varchar', editable: true },
    { name: 'min_rating', type: 'varchar', editable: true },
    { name: 'Males', type: 'varchar', editable: true },
    { name: 'Females', type: 'varchar', editable: true },
    { name: 'product_type', type: 'varchar', editable: true },
    { name: 'Field_Players', type: 'varchar', editable: true },
    { name: 'Gk_s', type: 'varchar', editable: true },
    { name: 'Sessions', type: 'text', editable: true },
    { name: 'enrollment_max', type: 'varchar', editable: true },
    { name: 'Message', type: 'text', editable: true },
    { name: 'enrollment_close_date', type: 'date', editable: true },
    { name: 'first_session_date', type: 'date', editable: true },
    { name: 'days_apart', type: 'tinyint', editable: true },
    { name: 'number_of_sessions', type: 'int', editable: true },
    { name: 'session_dates', type: 'text', editable: true },
    { name: 'session1_time', type: 'time', editable: true },
    { name: 'session2_time', type: 'time', editable: true },
    { name: 'min_yob_for_session_1', type: 'varchar', editable: true },
    { name: 'year', type: 'int', editable: false, generated: true },
    { name: 'month', type: 'int', editable: false, generated: true },
    { name: 'position_filter', type: 'varchar', editable: false, generated: true },
    { name: 'gender_filter', type: 'varchar', editable: false, generated: true },
    { name: 'sku', type: 'varchar', editable: false, generated: true },
  ];
  
  // State
  let state = {
    records: [],
    total: 0,
    page: 1,
    perPage: 100,
    totalPages: 1,
    columnOrder: COLUMNS.map(c => c.name),
    columnVisibility: Object.fromEntries(COLUMNS.map(c => [c.name, true])),
    columnWidths: {},
    sortColumn: 'wp_id',
    sortDirection: 'ASC',
    findMode: false,
    searchMode: false,
    editingRow: null,
    editingData: {},
    addingNew: false,
    newRowData: {},
    destructiveEnabled: false,
    deleteTarget: null,
    contextMenuColumn: null,
    // Views
    savedViews: [],
    currentViewId: null,
    // Lookups
    columnPrefs: [],
    lookupData: {}, // { column_name: [{value, label}, ...] }
    // Form modal
    formRecordId: null,
    formData: {},
  };
  
  // Load preferences from localStorage
  function loadPreferences() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const prefs = JSON.parse(saved);
        if (prefs.columnOrder) state.columnOrder = prefs.columnOrder;
        if (prefs.columnVisibility) state.columnVisibility = { ...state.columnVisibility, ...prefs.columnVisibility };
        if (prefs.columnWidths) state.columnWidths = prefs.columnWidths;
        if (prefs.currentViewId) state.currentViewId = prefs.currentViewId;
      }
    } catch (e) {
      console.warn('Failed to load preferences:', e);
    }
  }
  
  // Save preferences to localStorage
  function savePreferences() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        columnOrder: state.columnOrder,
        columnVisibility: state.columnVisibility,
        columnWidths: state.columnWidths,
        currentViewId: state.currentViewId,
      }));
    } catch (e) {
      console.warn('Failed to save preferences:', e);
    }
  }
  
  // Get current preferences object
  function getCurrentPrefs() {
    return {
      columnOrder: state.columnOrder,
      columnVisibility: state.columnVisibility,
      columnWidths: state.columnWidths,
      sortColumn: state.sortColumn,
      sortDirection: state.sortDirection,
    };
  }
  
  // Apply preferences to state
  function applyPrefs(prefs) {
    if (prefs.columnOrder) state.columnOrder = prefs.columnOrder;
    if (prefs.columnVisibility) state.columnVisibility = { ...state.columnVisibility, ...prefs.columnVisibility };
    if (prefs.columnWidths) state.columnWidths = prefs.columnWidths;
    if (prefs.sortColumn) state.sortColumn = prefs.sortColumn;
    if (prefs.sortDirection) state.sortDirection = prefs.sortDirection;
  }
  
  // Apply column_prefs (lookups) from view
  function applyColumnPrefs(columnPrefs) {
    if (columnPrefs && columnPrefs.column_prefs) {
      state.columnPrefs = columnPrefs.column_prefs;
    } else {
      state.columnPrefs = [];
    }
    // Clear cached lookup data when changing views
    state.lookupData = {};
  }
  
  // Get lookup config for a column (if any)
  function getLookupConfig(colName) {
    return state.columnPrefs.find(p => p.pref_type === 'lookup' && p.column === colName);
  }
  
  // Fetch lookup options from API
  async function fetchLookupOptions(lookupConfig) {
    const cacheKey = lookupConfig.column;
    
    // Return cached if available
    if (state.lookupData[cacheKey]) {
      return state.lookupData[cacheKey];
    }
    
    try {
      const params = new URLSearchParams({
        value_field: lookupConfig.value_field,
        display_field: lookupConfig.display_field,
        order_by: lookupConfig.order_by || lookupConfig.display_field,
        order: lookupConfig.order || 'ASC',
      });
      
      const data = await apiCall(`/lookup/${lookupConfig.lookup_table}?${params}`);
      
      if (data.success) {
        state.lookupData[cacheKey] = data.options;
        return data.options;
      }
    } catch (e) {
      console.warn('Failed to fetch lookup options:', e);
    }
    return [];
  }
  
  // Preload all lookup data for current view
  async function preloadLookups() {
    const lookupConfigs = state.columnPrefs.filter(p => p.pref_type === 'lookup');
    await Promise.all(lookupConfigs.map(config => fetchLookupOptions(config)));
  }
  
  // Get display value for a lookup field
  function getLookupDisplayValue(colName, value) {
    const options = state.lookupData[colName];
    if (!options || value === null || value === undefined || value === '') return value;
    
    const option = options.find(o => String(o.value) === String(value));
    return option ? option.label : value;
  }
  
  // Fetch saved views from database
  async function fetchViews() {
    try {
      const data = await apiCall('/views');
      if (data.success) {
        state.savedViews = data.views;
        renderViewsDropdown();
        
        // Apply column_prefs for current view (if any)
        if (state.currentViewId) {
          const view = state.savedViews.find(v => v.id == state.currentViewId);
          if (view && view.column_prefs) {
            applyColumnPrefs(view.column_prefs);
            await preloadLookups();
          }
        } else {
          // Check if there's a Default view and use its column_prefs
          const defaultView = state.savedViews.find(v => v.view_name === 'Default');
          if (defaultView && defaultView.column_prefs) {
            applyColumnPrefs(defaultView.column_prefs);
            await preloadLookups();
          }
        }
      }
    } catch (e) {
      console.warn('Failed to fetch views:', e);
    }
  }
  
  // Render the views as radio buttons
  function renderViewsDropdown() {
    const radiosContainer = document.getElementById('te-views-radios');
    
    let html = '';
    state.savedViews.forEach(view => {
      const isSelected = state.currentViewId == view.id || (!state.currentViewId && view.view_name === 'Default');
      html += `<label class="${isSelected ? 'selected' : ''}" data-view-id="${view.id}" data-created-by="${view.created_by || ''}" data-created-at="${view.created_at || ''}">
        <input type="radio" name="te-view-radio" value="${view.id}" ${isSelected ? 'checked' : ''} onchange="TE.loadSelectedView()">
        ${view.view_name}
      </label>`;
    });
    radiosContainer.innerHTML = html;
    
    // Update info text
    updateViewInfo();
  }
  
  // Get currently selected view info
  function getSelectedViewInfo() {
    const radiosContainer = document.getElementById('te-views-radios');
    const checkedLabel = radiosContainer.querySelector('label.selected') || radiosContainer.querySelector('input:checked')?.parentElement;
    
    if (checkedLabel) {
      return {
        id: checkedLabel.dataset.viewId,
        name: checkedLabel.textContent.trim(),
        createdBy: checkedLabel.dataset.createdBy || '',
        createdAt: checkedLabel.dataset.createdAt || ''
      };
    }
    
    return null;
  }
  
  // Update the view info text
  function updateViewInfo() {
    const info = document.getElementById('te-views-info');
    const deleteBtn = document.getElementById('te-btn-delete-view');
    const saveBtn = document.getElementById('te-btn-save-view');
    const renameBtn = document.getElementById('te-btn-rename-view');
    
    const viewInfo = getSelectedViewInfo();
    const isDefault = !viewInfo || viewInfo.name === 'Default';
    
    if (isDefault) {
      info.textContent = '';
      deleteBtn.style.display = 'none';
      saveBtn.style.display = 'none';
      renameBtn.style.display = 'none';
    } else {
      const date = viewInfo.createdAt ? new Date(viewInfo.createdAt).toLocaleDateString() : '';
      info.textContent = viewInfo.createdBy ? `by ${viewInfo.createdBy}${date ? ' on ' + date : ''}` : '';
      deleteBtn.style.display = 'inline-flex';
      saveBtn.style.display = 'inline-flex';
      renameBtn.style.display = 'inline-flex';
    }
  }
  
  // Show status message
  function showStatus(message, type = 'info') {
    const el = document.getElementById('te-status');
    el.textContent = message;
    el.className = `te-status visible ${type}`;
    if (type === 'success') {
      setTimeout(() => { el.classList.remove('visible'); }, 3000);
    }
  }
  
  function hideStatus() {
    document.getElementById('te-status').classList.remove('visible');
  }
  
  // API calls
  async function apiCall(endpoint, options = {}) {
    const url = `${API_BASE}${endpoint}`;
    const response = await fetch(url, {
      headers: {
        'Content-Type': 'application/json',
        'X-WP-Nonce': (typeof wpApiSettings !== 'undefined') ? wpApiSettings.nonce : '',
      },
      credentials: 'same-origin',
      ...options,
    });
    return response.json();
  }
  
  // Fetch records
  async function fetchRecords() {
    showStatus('Loading records...', 'info');
    try {
      const params = new URLSearchParams({
        page: state.page,
        per_page: state.perPage,
        order_by: state.sortColumn,
        order: state.sortDirection,
      });
      const data = await apiCall(`/records?${params}`);
      if (data.success) {
        state.records = data.records;
        state.total = data.total;
        state.totalPages = data.total_pages;
        state.searchMode = false;
        hideStatus();
        render();
      } else {
        showStatus(data.message || 'Failed to load records', 'error');
      }
    } catch (e) {
      showStatus('Error: ' + e.message, 'error');
    }
  }
  
  // Search records
  async function searchRecords(criteria) {
    showStatus('Searching...', 'info');
    try {
      const data = await apiCall(`/search?page=${state.page}&per_page=${state.perPage}`, {
        method: 'POST',
        body: JSON.stringify(criteria),
      });
      if (data.success) {
        state.records = data.records;
        state.total = data.total;
        state.totalPages = data.total_pages;
        state.searchMode = true;
        showStatus(`Found ${data.total} matching record(s)`, 'info');
        render();
      } else {
        showStatus(data.message || 'Search failed', 'error');
      }
    } catch (e) {
      showStatus('Error: ' + e.message, 'error');
    }
  }
  
  // Create record
  async function createRecord(data) {
    showStatus('Creating record...', 'info');
    try {
      const result = await apiCall('/records', {
        method: 'POST',
        body: JSON.stringify(data),
      });
      if (result.success) {
        showStatus('Record created successfully', 'success');
        state.addingNew = false;
        state.newRowData = {};
        fetchRecords();
      } else {
        showStatus(result.message || 'Failed to create record', 'error');
      }
    } catch (e) {
      showStatus('Error: ' + e.message, 'error');
    }
  }
  
  // Update record
  async function updateRecord(wpId, data) {
    showStatus('Saving changes...', 'info');
    try {
      const result = await apiCall(`/records/${encodeURIComponent(wpId)}`, {
        method: 'PUT',
        body: JSON.stringify(data),
      });
      if (result.success) {
        showStatus('Record updated successfully', 'success');
        state.editingRow = null;
        state.editingData = {};
        // Update local record
        const idx = state.records.findIndex(r => r.wp_id === wpId);
        if (idx >= 0) state.records[idx] = result.record;
        render();
      } else {
        showStatus(result.message || 'Failed to update record', 'error');
      }
    } catch (e) {
      showStatus('Error: ' + e.message, 'error');
    }
  }
  
  // Delete record
  async function deleteRecord(wpId) {
    showStatus('Deleting record...', 'info');
    try {
      const result = await apiCall(`/records/${encodeURIComponent(wpId)}`, {
        method: 'DELETE',
      });
      if (result.success) {
        showStatus('Record deleted successfully', 'success');
        fetchRecords();
      } else {
        showStatus(result.message || 'Failed to delete record', 'error');
      }
    } catch (e) {
      showStatus('Error: ' + e.message, 'error');
    }
  }
  
  // Get visible columns in order
  function getVisibleColumns() {
    return state.columnOrder.filter(name => state.columnVisibility[name]);
  }
  
  // Get column definition by name
  function getColumnDef(name) {
    return COLUMNS.find(c => c.name === name);
  }
  
  // Get default width for column based on name length
  function getDefaultWidth(name) {
    const minWidth = 80;
    const charWidth = 8;
    return Math.max(minWidth, name.length * charWidth + 40);
  }
  
  // Get column width
  function getColumnWidth(name) {
    return state.columnWidths[name] || getDefaultWidth(name);
  }
  
  // Render column toggles
  function renderColumnToggles() {
    const container = document.getElementById('te-column-toggles');
    container.innerHTML = '';
    
    state.columnOrder.forEach((colName, index) => {
      const isVisible = state.columnVisibility[colName];
      const col = getColumnDef(colName);
      
      const toggle = document.createElement('div');
      toggle.className = `te-column-toggle ${isVisible ? '' : 'hidden'}`;
      toggle.draggable = true;
      toggle.dataset.column = colName;
      const displayName = formatColumnName(colName);
      toggle.innerHTML = `
        <span class="drag-handle">⋮⋮</span>
        <input type="checkbox" ${isVisible ? 'checked' : ''} onchange="TE.toggleColumn('${colName}')">
        <span>${displayName}</span>
      `;
      
      // Drag events
      toggle.addEventListener('dragstart', (e) => {
        toggle.classList.add('dragging');
        e.dataTransfer.setData('text/plain', colName);
      });
      
      toggle.addEventListener('dragend', () => {
        toggle.classList.remove('dragging');
      });
      
      toggle.addEventListener('dragover', (e) => {
        e.preventDefault();
      });
      
      toggle.addEventListener('drop', (e) => {
        e.preventDefault();
        const draggedCol = e.dataTransfer.getData('text/plain');
        const targetCol = colName;
        if (draggedCol !== targetCol) {
          reorderColumns(draggedCol, targetCol);
        }
      });
      
      container.appendChild(toggle);
    });
  }
  
  // Reorder columns
  function reorderColumns(draggedCol, targetCol) {
    const order = [...state.columnOrder];
    const fromIdx = order.indexOf(draggedCol);
    const toIdx = order.indexOf(targetCol);
    
    order.splice(fromIdx, 1);
    order.splice(toIdx, 0, draggedCol);
    
    state.columnOrder = order;
    savePreferences();
    renderColumnToggles();
    render();
  }
  
  // Render table header
  function renderHeader() {
    const thead = document.getElementById('te-thead');
    const visibleCols = getVisibleColumns();
    
    let html = '<tr>';
    html += '<th style="width: 100px; min-width: 100px;">Actions</th>';
    
    visibleCols.forEach(colName => {
      const width = getColumnWidth(colName);
      const col = getColumnDef(colName);
      const displayName = formatColumnName(colName);
      const isSorted = state.sortColumn === colName;
      const sortIndicator = isSorted ? (state.sortDirection === 'ASC' ? ' ↑' : ' ↓') : '';
      const sortedClass = isSorted ? ' sorted' : '';
      html += `<th style="width: ${width}px;" data-column="${colName}" class="${sortedClass}">
        <span class="th-label">${displayName}${sortIndicator}</span>
        <div class="resize-handle" data-resize-col="${colName}"></div>
      </th>`;
    });
    
    html += '</tr>';
    
    // Find mode row
    if (state.findMode) {
      html += '<tr class="te-find-row">';
      html += '<td><button class="te-btn te-btn-sm te-btn-primary" onclick="TE.performFind()">Find</button></td>';
      visibleCols.forEach(colName => {
        html += `<td><input type="text" class="te-find-input" data-column="${colName}" placeholder="Search..." onkeydown="if(event.key==='Enter')TE.performFind()"></td>`;
      });
      html += '</tr>';
    }
    
    thead.innerHTML = html;
  }
  
  // Render an editable cell (handles lookups)
  function renderEditableCell(colName, value, onChangeHandler) {
    const col = getColumnDef(colName);
    const lookupConfig = getLookupConfig(colName);
    
    // If this is a lookup field with cached data, render type-ahead input
    if (lookupConfig && state.lookupData[colName]) {
      const options = state.lookupData[colName];
      const datalistId = `dl-${colName}-${Date.now()}`;
      
      // Find current display value
      const currentOption = options.find(o => String(o.value) === String(value));
      const displayValue = currentOption ? currentOption.label : '';
      
      let html = `<input type="text" 
        class="te-cell-edit te-lookup-input" 
        list="${datalistId}"
        data-column="${colName}"
        data-lookup-value="${escapeHtml(value)}"
        value="${escapeHtml(displayValue)}"
        placeholder="Type to search..."
        onchange="TE.handleLookupChange(this, '${colName}')"
        oninput="TE.handleLookupInput(this, '${colName}')"
      >`;
      html += `<datalist id="${datalistId}">`;
      options.forEach(opt => {
        html += `<option value="${escapeHtml(opt.label)}" data-value="${escapeHtml(opt.value)}">`;
      });
      html += '</datalist>';
      return html;
    }
    
    // Otherwise render standard input
    const inputType = getInputType(col.type);
    if (col.type === 'text') {
      return `<textarea class="te-cell-edit" data-column="${colName}" onchange="${onChangeHandler}">${escapeHtml(value)}</textarea>`;
    } else {
      return `<input type="${inputType}" class="te-cell-edit" data-column="${colName}" value="${escapeHtml(value)}" onchange="${onChangeHandler}" ${col.primary ? 'required' : ''}>`;
    }
  }
  
  // Get display value for a cell (handles lookups)
  function getCellDisplayValue(colName, value) {
    const lookupConfig = getLookupConfig(colName);
    if (lookupConfig && state.lookupData[colName]) {
      return getLookupDisplayValue(colName, value);
    }
    return value;
  }
  
  // Render a form field for the form modal
  function renderFormField(colName, value) {
    const col = getColumnDef(colName);
    const displayName = formatColumnName(colName);
    const lookupConfig = getLookupConfig(colName);
    const isReadonly = col.primary || col.generated || !col.editable;
    const fieldClass = isReadonly ? 'te-form-field readonly' : 'te-form-field';
    
    let inputHtml = '';
    const hasLineBreaks = value && /\r\n|\r|\n/.test(String(value));
    
    if (isReadonly) {
      // Read-only field - use div for multi-line, input for single-line
      if (hasLineBreaks) {
        inputHtml = `<div class="te-form-readonly-text">${formatDisplayText(value || '')}</div>`;
      } else {
        inputHtml = `<input type="text" value="${escapeHtml(value || '')}" disabled>`;
      }
    } else if (lookupConfig && state.lookupData[colName]) {
      // Lookup dropdown
      const options = state.lookupData[colName];
      inputHtml = `<select onchange="TE.updateFormData('${colName}', this.value)">`;
      inputHtml += `<option value="">-- Select --</option>`;
      options.forEach(opt => {
        const selected = String(opt.value) === String(value) ? 'selected' : '';
        inputHtml += `<option value="${escapeHtml(opt.value)}" ${selected}>${escapeHtml(opt.label)}</option>`;
      });
      inputHtml += '</select>';
    } else if (col.type === 'text') {
      // Textarea for text fields
      inputHtml = `<textarea onchange="TE.updateFormData('${colName}', this.value)">${escapeHtml(value || '')}</textarea>`;
    } else {
      // Standard input
      const inputType = getInputType(col.type);
      inputHtml = `<input type="${inputType}" value="${escapeHtml(value || '')}" onchange="TE.updateFormData('${colName}', this.value)">`;
    }
    
    return `<div class="${fieldClass}">
      <label>${displayName}</label>
      ${inputHtml}
    </div>`;
  }
  
  // Render table body
  function renderBody() {
    const tbody = document.getElementById('te-tbody');
    const visibleCols = getVisibleColumns();
    
    if (state.records.length === 0 && !state.addingNew) {
      tbody.innerHTML = `<tr><td colspan="${visibleCols.length + 1}" class="te-empty">No records found</td></tr>`;
      return;
    }
    
    let html = '';
    
    // New row (if adding)
    if (state.addingNew) {
      html += '<tr class="editing">';
      html += `<td class="te-row-actions">
        <button class="te-row-btn te-row-btn-save" onclick="TE.saveNewRecord()">Save</button>
        <button class="te-row-btn te-row-btn-cancel" onclick="TE.cancelAdd()">Cancel</button>
      </td>`;
      
      visibleCols.forEach(colName => {
        const col = getColumnDef(colName);
        const value = state.newRowData[colName] || '';
        
        if (col.generated) {
          html += `<td class="te-cell-readonly">—</td>`;
        } else {
          html += `<td>${renderEditableCell(colName, value, `TE.updateNewRowData('${colName}', this.value)`)}</td>`;
        }
      });
      html += '</tr>';
    }
    
    // Existing rows
    state.records.forEach((record, idx) => {
      const isEditing = state.editingRow === record.wp_id;
      html += `<tr class="${isEditing ? 'editing' : ''}">`;
      
      // Actions column
      if (isEditing) {
        html += `<td class="te-row-actions">
          <button class="te-row-btn te-row-btn-save" onclick="TE.saveEdit('${escapeHtml(record.wp_id)}')">Save</button>
          <button class="te-row-btn te-row-btn-cancel" onclick="TE.cancelEdit()">Cancel</button>
        </td>`;
      } else {
        html += `<td class="te-row-actions">
          <button class="te-row-btn te-row-btn-edit" onclick="TE.openFormModal('${escapeHtml(record.wp_id)}')">Form</button>
          ${state.destructiveEnabled ? `<button class="te-row-btn te-row-btn-delete" onclick="TE.promptDelete('${escapeHtml(record.wp_id)}')">Delete</button>` : ''}
        </td>`;
      }
      
      // Data columns
      visibleCols.forEach(colName => {
        const col = getColumnDef(colName);
        const value = record[colName] ?? '';
        
        if (isEditing && col.editable && !col.primary) {
          const editValue = state.editingData[colName] ?? value;
          html += `<td>${renderEditableCell(colName, editValue, `TE.updateEditData('${colName}', this.value)`)}</td>`;
        } else {
          let cellClass = '';
          let clickHandler = '';
          
          if (col.primary) {
            cellClass = 'te-cell-primary';
          } else if (col.generated || !col.editable) {
            cellClass = 'te-cell-readonly';
          } else {
            // Editable cell - make clickable
            cellClass = 'te-cell-clickable';
            clickHandler = `onclick="TE.startEdit('${escapeHtml(record.wp_id)}', '${colName}')"`;
          }
          
          // Show display value for lookups
          const displayValue = getCellDisplayValue(colName, value);
          const isClickableCell = cellClass.includes('te-cell-clickable');
          html += `<td class="${cellClass}" ${clickHandler}>${renderCellContent(displayValue, isClickableCell)}</td>`;
        }
      });
      
      html += '</tr>';
    });
    
    tbody.innerHTML = html;
  }
  
  // Render pagination
  function renderPagination() {
    const container = document.getElementById('te-pagination');
    const start = (state.page - 1) * state.perPage + 1;
    const end = Math.min(state.page * state.perPage, state.total);
    
    let html = `<div class="te-pagination-info">
      Showing ${start}-${end} of ${state.total} records
      ${state.searchMode ? '(filtered)' : ''}
    </div>`;
    
    html += '<div class="te-pagination-controls">';
    html += `<button class="te-btn te-btn-sm te-btn-secondary" onclick="TE.goToPage(1)" ${state.page <= 1 ? 'disabled' : ''}>First</button>`;
    html += `<button class="te-btn te-btn-sm te-btn-secondary" onclick="TE.goToPage(${state.page - 1})" ${state.page <= 1 ? 'disabled' : ''}>Prev</button>`;
    html += `<span style="padding: 0 10px;">Page ${state.page} of ${state.totalPages}</span>`;
    html += `<button class="te-btn te-btn-sm te-btn-secondary" onclick="TE.goToPage(${state.page + 1})" ${state.page >= state.totalPages ? 'disabled' : ''}>Next</button>`;
    html += `<button class="te-btn te-btn-sm te-btn-secondary" onclick="TE.goToPage(${state.totalPages})" ${state.page >= state.totalPages ? 'disabled' : ''}>Last</button>`;
    html += '</div>';
    
    container.innerHTML = html;
  }
  
  // Main render function
  function render() {
    renderHeader();
    renderBody();
    renderPagination();
    
    // Update button states - Show All appears when in find mode OR search mode
    document.getElementById('te-btn-show-all').style.display = (state.searchMode || state.findMode) ? 'inline-flex' : 'none';
  }
  
  // Helper functions
  function getInputType(colType) {
    switch (colType) {
      case 'int':
      case 'tinyint': return 'number';
      case 'date': return 'date';
      case 'time': return 'time';
      default: return 'text';
    }
  }
  
  // Format column name for display (underscores to spaces)
  function formatColumnName(colName) {
    return colName.replace(/_/g, ' ');
  }
  
  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  
  // Format text for display - respects line breaks (char 10 = LF, char 13 = CR)
  function formatDisplayText(str) {
    if (str === null || str === undefined || str === '') return '';
    // First escape HTML, then convert line breaks to <br>
    let escaped = escapeHtml(str);
    // Handle \r\n (Windows), \r (old Mac), and \n (Unix)
    return escaped.replace(/\r\n|\r|\n/g, '<br>');
  }
  
  // Check if text needs expandable box (has line breaks or would be 4+ lines)
  function needsExpandableBox(str) {
    if (str === null || str === undefined || str === '') return false;
    const text = String(str);
    // Count line breaks
    const lineBreaks = (text.match(/\r\n|\r|\n/g) || []).length;
    // If 4+ line breaks, needs expansion
    return lineBreaks >= 3;
  }
  
  // Render cell content - handles line breaks and expandable boxes
  function renderCellContent(value, isClickable = false) {
    const text = value ?? '';
    if (needsExpandableBox(text)) {
      const formatted = formatDisplayText(text);
      // For clickable cells, let the click bubble up; for non-clickable, stop propagation on resize
      return `<div class="te-expandable-text">${formatted}</div>`;
    }
    return formatDisplayText(text);
  }
  
  // Column resize functionality
  let resizeState = { active: false, column: null, startX: 0, startWidth: 0, th: null };
  
  function initResizeHandlers() {
    const thead = document.getElementById('te-thead');
    
    thead.addEventListener('mousedown', function(e) {
      const handle = e.target.closest('.resize-handle');
      if (!handle) return;
      
      e.preventDefault();
      e.stopPropagation();
      
      const colName = handle.dataset.resizeCol;
      const th = handle.closest('th');
      
      resizeState.active = true;
      resizeState.column = colName;
      resizeState.startX = e.pageX;
      resizeState.startWidth = getColumnWidth(colName);
      resizeState.th = th;
      
      th.classList.add('resizing');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      
      document.addEventListener('mousemove', handleResize);
      document.addEventListener('mouseup', stopResize);
    });
  }
  
  function handleResize(e) {
    if (!resizeState.active) return;
    
    const diff = e.pageX - resizeState.startX;
    const newWidth = Math.max(30, resizeState.startWidth + diff);
    state.columnWidths[resizeState.column] = newWidth;
    
    // Update column width in DOM immediately for smooth feedback
    if (resizeState.th) {
      resizeState.th.style.width = newWidth + 'px';
    }
  }
  
  function stopResize() {
    if (resizeState.active) {
      resizeState.active = false;
      if (resizeState.th) {
        resizeState.th.classList.remove('resizing');
      }
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      savePreferences();
    }
    resizeState.th = null;
    document.removeEventListener('mousemove', handleResize);
    document.removeEventListener('mouseup', stopResize);
  }
  
  // Context menu functionality
  function initContextMenu() {
    const thead = document.getElementById('te-thead');
    const menu = document.getElementById('te-context-menu');
    
    // Right-click on column headers
    thead.addEventListener('contextmenu', function(e) {
      const th = e.target.closest('th[data-column]');
      if (!th) return;
      
      e.preventDefault();
      
      const colName = th.dataset.column;
      state.contextMenuColumn = colName;
      
      // Update menu title
      document.getElementById('te-context-menu-title').textContent = formatColumnName(colName);
      
      // Position the menu
      const x = e.pageX;
      const y = e.pageY;
      
      menu.style.left = x + 'px';
      menu.style.top = y + 'px';
      menu.classList.add('visible');
      
      // Adjust if menu goes off screen
      setTimeout(() => {
        const rect = menu.getBoundingClientRect();
        if (rect.right > window.innerWidth) {
          menu.style.left = (x - rect.width) + 'px';
        }
        if (rect.bottom > window.innerHeight) {
          menu.style.top = (y - rect.height) + 'px';
        }
      }, 0);
    });
    
    // Close menu on click elsewhere
    document.addEventListener('click', function(e) {
      if (!menu.contains(e.target)) {
        menu.classList.remove('visible');
      }
    });
    
    // Close menu on scroll
    document.addEventListener('scroll', function() {
      menu.classList.remove('visible');
    }, true);
    
    // Close menu on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        menu.classList.remove('visible');
      }
    });
  }
  
  function closeContextMenu() {
    document.getElementById('te-context-menu').classList.remove('visible');
  }
  
  // Public API
  window.TE = {
    init: function() {
      loadPreferences();
      renderColumnToggles();
      initResizeHandlers();
      initContextMenu();
      fetchViews();
      fetchRecords();
    },
    
    refresh: function() {
      if (state.searchMode) {
        // Re-run the search
        TE.performFind();
      } else {
        fetchRecords();
      }
    },
    
    toggleColumnControls: function() {
      const el = document.getElementById('te-column-controls');
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    },
    
    toggleColumn: function(colName) {
      state.columnVisibility[colName] = !state.columnVisibility[colName];
      savePreferences();
      renderColumnToggles();
      render();
    },
    
    showAllColumns: function() {
      COLUMNS.forEach(c => state.columnVisibility[c.name] = true);
      savePreferences();
      renderColumnToggles();
      render();
    },
    
    hideAllColumns: function() {
      // Keep at least wp_id visible
      COLUMNS.forEach(c => state.columnVisibility[c.name] = c.name === 'wp_id');
      savePreferences();
      renderColumnToggles();
      render();
    },
    
    resetColumns: function() {
      state.columnOrder = COLUMNS.map(c => c.name);
      state.columnVisibility = Object.fromEntries(COLUMNS.map(c => [c.name, true]));
      state.columnWidths = {};
      savePreferences();
      renderColumnToggles();
      render();
    },
    
    toggleFindMode: function() {
      state.findMode = !state.findMode;
      if (!state.findMode && state.searchMode) {
        // If canceling find while in search mode, stay in search mode
      }
      render();
    },
    
    performFind: function() {
      const inputs = document.querySelectorAll('.te-find-input');
      const criteria = {};
      
      inputs.forEach(input => {
        const val = input.value.trim();
        if (val) {
          criteria[input.dataset.column] = val;
        }
      });
      
      if (Object.keys(criteria).length === 0) {
        showStatus('Enter at least one search criterion', 'warning');
        return;
      }
      
      state.page = 1;
      searchRecords(criteria);
    },
    
    showAllRecords: function() {
      state.page = 1;
      state.findMode = false;
      state.searchMode = false;
      hideStatus();
      fetchRecords();
    },
    
    toggleDestructive: function() {
      state.destructiveEnabled = document.getElementById('te-enable-destructive').checked;
      document.getElementById('te-btn-add').disabled = !state.destructiveEnabled;
      render();
    },
    
    addNewRecord: function() {
      if (!state.destructiveEnabled) return;
      state.addingNew = true;
      state.newRowData = {};
      render();
      // Focus first input
      setTimeout(() => {
        const firstInput = document.querySelector('tr.editing .te-cell-edit');
        if (firstInput) firstInput.focus();
      }, 50);
    },
    
    updateNewRowData: function(colName, value) {
      state.newRowData[colName] = value;
    },
    
    saveNewRecord: function() {
      if (!state.newRowData.wp_id) {
        showStatus('wp_id is required', 'error');
        return;
      }
      createRecord(state.newRowData);
    },
    
    cancelAdd: function() {
      state.addingNew = false;
      state.newRowData = {};
      render();
    },
    
    startEdit: function(wpId, focusColumn) {
      const record = state.records.find(r => r.wp_id === wpId);
      if (!record) return;
      
      state.editingRow = wpId;
      state.editingData = { ...record };
      render();
      
      // Focus on the clicked column's input
      if (focusColumn) {
        setTimeout(() => {
          const input = document.querySelector(`tr.editing .te-cell-edit[data-column="${focusColumn}"], tr.editing .te-lookup-input[data-column="${focusColumn}"]`);
          if (input) {
            input.focus();
            if (input.select) input.select();
          }
        }, 50);
      }
    },
    
    updateEditData: function(colName, value) {
      state.editingData[colName] = value;
    },
    
    saveEdit: function(wpId) {
      updateRecord(wpId, state.editingData);
    },
    
    cancelEdit: function() {
      state.editingRow = null;
      state.editingData = {};
      render();
    },
    
    promptDelete: function(wpId) {
      if (!state.destructiveEnabled) return;
      state.deleteTarget = wpId;
      document.getElementById('te-delete-id').textContent = wpId;
      document.getElementById('te-delete-modal').classList.add('visible');
    },
    
    closeDeleteModal: function() {
      state.deleteTarget = null;
      document.getElementById('te-delete-modal').classList.remove('visible');
    },
    
    confirmDelete: function() {
      if (state.deleteTarget) {
        deleteRecord(state.deleteTarget);
        TE.closeDeleteModal();
      }
    },
    
    // === FORM MODAL ===
    
    openFormModal: function(wpId) {
      const record = state.records.find(r => r.wp_id === wpId);
      if (!record) return;
      
      state.formRecordId = wpId;
      state.formData = { ...record };
      
      // Get visible columns (Core Items) and hidden columns (Other Items)
      const visibleCols = getVisibleColumns();
      const allCols = COLUMNS.map(c => c.name);
      const hiddenCols = allCols.filter(c => !visibleCols.includes(c));
      
      // Build form HTML
      let html = '';
      
      // Core Items section
      html += '<div class="te-form-section">';
      html += '<h4 class="te-form-section-title">Core Items</h4>';
      html += '<div class="te-form-grid">';
      visibleCols.forEach(colName => {
        html += renderFormField(colName, state.formData[colName]);
      });
      html += '</div></div>';
      
      // Other Items section (if any hidden columns)
      if (hiddenCols.length > 0) {
        html += '<div class="te-form-section">';
        html += '<h4 class="te-form-section-title">Other Items</h4>';
        html += '<div class="te-form-grid">';
        hiddenCols.forEach(colName => {
          html += renderFormField(colName, state.formData[colName]);
        });
        html += '</div></div>';
      }
      
      document.getElementById('te-form-content').innerHTML = html;
      document.getElementById('te-form-title').textContent = `Record: ${wpId}`;
      document.getElementById('te-form-modal').classList.add('visible');
    },
    
    closeFormModal: function() {
      state.formRecordId = null;
      state.formData = {};
      document.getElementById('te-form-modal').classList.remove('visible');
    },
    
    updateFormData: function(colName, value) {
      state.formData[colName] = value;
    },
    
    saveFormRecord: async function() {
      if (!state.formRecordId) return;
      
      showStatus('Saving record...', 'info');
      try {
        const result = await apiCall(`/records/${encodeURIComponent(state.formRecordId)}`, {
          method: 'PUT',
          body: JSON.stringify(state.formData),
        });
        
        if (result.success) {
          showStatus('Record saved successfully', 'success');
          // Update local record
          const idx = state.records.findIndex(r => r.wp_id === state.formRecordId);
          if (idx >= 0) state.records[idx] = result.record;
          TE.closeFormModal();
          render();
        } else {
          showStatus(result.message || 'Failed to save record', 'error');
        }
      } catch (e) {
        showStatus('Error: ' + e.message, 'error');
      }
    },
    
    goToPage: function(page) {
      if (page < 1 || page > state.totalPages) return;
      state.page = page;
      
      if (state.searchMode) {
        TE.performFind();
      } else {
        fetchRecords();
      }
    },
    
    // Context menu actions
    contextSortAsc: function() {
      if (!state.contextMenuColumn) return;
      state.sortColumn = state.contextMenuColumn;
      state.sortDirection = 'ASC';
      state.page = 1;
      closeContextMenu();
      fetchRecords();
    },
    
    contextSortDesc: function() {
      if (!state.contextMenuColumn) return;
      state.sortColumn = state.contextMenuColumn;
      state.sortDirection = 'DESC';
      state.page = 1;
      closeContextMenu();
      fetchRecords();
    },
    
    contextHideColumn: function() {
      if (!state.contextMenuColumn) return;
      state.columnVisibility[state.contextMenuColumn] = false;
      savePreferences();
      closeContextMenu();
      renderColumnToggles();
      render();
    },
    
    contextShowAllColumns: function() {
      COLUMNS.forEach(c => state.columnVisibility[c.name] = true);
      savePreferences();
      closeContextMenu();
      renderColumnToggles();
      render();
    },
    
    // === LOOKUP HANDLERS ===
    
    handleLookupInput: function(input, colName) {
      // As user types, try to match and update the hidden value
      const options = state.lookupData[colName] || [];
      const typedValue = input.value.trim().toLowerCase();
      const match = options.find(o => o.label.toLowerCase() === typedValue);
      
      if (match) {
        input.dataset.lookupValue = match.value;
      }
    },
    
    handleLookupChange: function(input, colName) {
      const options = state.lookupData[colName] || [];
      const typedValue = input.value.trim();
      
      // Find exact match (case-insensitive)
      const match = options.find(o => o.label.toLowerCase() === typedValue.toLowerCase());
      
      let valueToSave = '';
      if (match) {
        valueToSave = match.value;
        input.value = match.label; // Normalize case
        input.dataset.lookupValue = match.value;
      } else if (typedValue === '') {
        valueToSave = '';
        input.dataset.lookupValue = '';
      } else {
        // No match - reset to empty or keep previous
        input.value = '';
        input.dataset.lookupValue = '';
        valueToSave = '';
      }
      
      // Update the appropriate state
      if (state.addingNew) {
        state.newRowData[colName] = valueToSave;
      } else if (state.editingRow) {
        state.editingData[colName] = valueToSave;
      }
    },
    
    // === VIEWS ACTIONS ===
    
    saveCurrentView: async function() {
      const viewInfo = getSelectedViewInfo();
      
      // Don't allow saving to Default
      if (!viewInfo || viewInfo.name === 'Default') {
        showStatus('Cannot overwrite the Default view. Use "Save As..." instead.', 'warning');
        return;
      }
      
      showStatus('Saving view...', 'info');
      try {
        const result = await apiCall('/views', {
          method: 'POST',
          body: JSON.stringify({
            view_name: viewInfo.name,
            prefs: getCurrentPrefs(),
          }),
        });
        
        if (result.success) {
          showStatus(`View "${viewInfo.name}" saved`, 'success');
          state.currentViewId = result.id;
          await fetchViews();
          updateViewInfo();
        } else {
          showStatus(result.message || 'Failed to save view', 'error');
        }
      } catch (e) {
        showStatus('Error: ' + e.message, 'error');
      }
    },
    
    loadSelectedView: async function() {
      // Get selected view ID from radio buttons
      const radiosContainer = document.getElementById('te-views-radios');
      const checkedRadio = radiosContainer.querySelector('input:checked');
      const viewId = checkedRadio ? checkedRadio.value : null;
      
      // Update selected class on labels
      radiosContainer.querySelectorAll('label').forEach(lbl => {
        lbl.classList.toggle('selected', lbl.querySelector('input')?.checked);
      });
      
      // Exit find/search mode when switching views
      state.findMode = false;
      state.searchMode = false;
      hideStatus();
      
      // Find and apply the saved view
      const view = state.savedViews.find(v => v.id == viewId);
      if (view) {
        if (view.view_name === 'Default') {
          // Reset to defaults
          state.columnOrder = COLUMNS.map(c => c.name);
          state.columnVisibility = Object.fromEntries(COLUMNS.map(c => [c.name, true]));
          state.columnWidths = {};
          state.sortColumn = 'wp_id';
          state.sortDirection = 'ASC';
          state.currentViewId = view.id;
        } else {
          if (view.prefs) applyPrefs(view.prefs);
          state.currentViewId = viewId;
        }
        applyColumnPrefs(view.column_prefs);
      }
      
      // Preload lookup data
      await preloadLookups();
      
      savePreferences();
      updateViewInfo();
      renderColumnToggles();
      render();
      
      // Refetch if sort changed
      state.page = 1;
      fetchRecords();
    },
    
    renameSelectedView: async function() {
      const viewInfo = getSelectedViewInfo();
      if (!viewInfo || viewInfo.name === 'Default') {
        showStatus('Cannot rename the Default view', 'warning');
        return;
      }
      
      const newName = prompt('Enter new name for this view:', viewInfo.name);
      if (!newName || !newName.trim() || newName.trim() === viewInfo.name) return;
      
      const trimmedName = newName.trim();
      if (trimmedName === 'Default') {
        showStatus('Cannot use "Default" as a view name', 'warning');
        return;
      }
      
      showStatus('Renaming view...', 'info');
      try {
        // We'll use the save endpoint which updates if name exists
        // First delete the old view, then create with new name
        const view = state.savedViews.find(v => v.id == viewInfo.id);
        if (!view) return;
        
        // Save with new name (this creates a new entry)
        const saveResult = await apiCall('/views', {
          method: 'POST',
          body: JSON.stringify({
            view_name: trimmedName,
            prefs: view.prefs || getCurrentPrefs(),
          }),
        });
        
        if (saveResult.success) {
          // Delete the old view
          await apiCall(`/views/${viewInfo.id}`, { method: 'DELETE' });
          
          showStatus(`View renamed to "${trimmedName}"`, 'success');
          state.currentViewId = saveResult.id;
          await fetchViews();
          savePreferences();
        } else {
          showStatus(saveResult.message || 'Failed to rename view', 'error');
        }
      } catch (e) {
        showStatus('Error: ' + e.message, 'error');
      }
    },
    
    saveViewAs: async function() {
      const name = prompt('Enter a name for this view:');
      if (!name || !name.trim()) return;
      
      const viewName = name.trim();
      
      showStatus('Saving view...', 'info');
      try {
        const result = await apiCall('/views', {
          method: 'POST',
          body: JSON.stringify({
            view_name: viewName,
            prefs: getCurrentPrefs(),
          }),
        });
        
        if (result.success) {
          showStatus(result.message, 'success');
          state.currentViewId = result.id;
          await fetchViews();
          updateViewInfo();
          savePreferences();
        } else {
          showStatus(result.message || 'Failed to save view', 'error');
        }
      } catch (e) {
        showStatus('Error: ' + e.message, 'error');
      }
    },
    
    deleteSelectedView: async function() {
      const viewInfo = getSelectedViewInfo();
      
      if (!viewInfo || viewInfo.name === 'Default') {
        showStatus('Cannot delete the Default view', 'warning');
        return;
      }
      
      if (!confirm(`Delete view "${viewInfo.name}"?`)) return;
      
      showStatus('Deleting view...', 'info');
      try {
        const result = await apiCall(`/views/${viewInfo.id}`, {
          method: 'DELETE',
        });
        
        if (result.success) {
          showStatus('View deleted', 'success');
          // Find the Default view and select it
          const defaultView = state.savedViews.find(v => v.view_name === 'Default');
          state.currentViewId = defaultView ? defaultView.id : null;
          await fetchViews();
          TE.loadSelectedView();
        } else {
          showStatus(result.message || 'Failed to delete view', 'error');
        }
      } catch (e) {
        showStatus('Error: ' + e.message, 'error');
      }
    },
  };
  
  // Initialize on load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', TE.init);
  } else {
    TE.init();
  }
})();
</script>
